<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Classplus Training Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F4F0;
      --surface: #FFFFFF;
      --sand: #EFEEE8;
      --warm-gray: #D1CFC6;
      --deep: #1A1A1A;
      --text: #3A3A3A;
      --text-light: #7A7A72;
      --teal: #1B6B6D;
      --teal-light: #248F8D;
      --teal-glow: rgba(27,107,109,0.15);
      --teal-pale: rgba(27,107,109,0.07);
      --coral: #C05A42;
      --coral-bg: rgba(192,90,66,0.08);
      --sage: #6B8F6F;
      --gold: #B8922E;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN SCREEN ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--sand);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-md);
    }

    .login-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 20px;
      box-shadow: 0 4px 16px var(--teal-glow);
    }
    .login-icon img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .login-card h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 26px; font-weight: 400;
      margin-bottom: 4px;
    }

    .login-card .login-sub {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    .login-field {
      position: relative;
      margin-bottom: 16px;
    }

    .login-field input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--sand);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--teal); }

    .login-error {
      color: var(--coral);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--teal-light); }

    .login-hint {
      font-size: 11px;
      color: var(--warm-gray);
      margin-top: 16px;
    }

    /* ── ADMIN DASHBOARD ── */
    .admin-app { display: none; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--sand);
      position: sticky; top: 0; z-index: 100;
    }

    .admin-logo { display: flex; align-items: center; gap: 12px; }

    .admin-logo-mark {
      width: 38px; height: 38px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .admin-logo-mark img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .admin-logo h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 20px; font-weight: 400;
      color: var(--deep);
    }
    .admin-logo h1 em {
      font-style: normal;
      background: var(--deep);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      vertical-align: middle;
      margin-left: 8px;
    }

    .admin-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-xs);
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--teal); color: white; box-shadow: 0 2px 8px var(--teal-glow); }
    .btn-primary:hover { background: var(--teal-light); }
    .btn-outline { background: transparent; color: var(--text-light); border: 1px solid var(--warm-gray); }
    .btn-outline:hover { color: var(--text); border-color: var(--text-light); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon {
      width: 34px; height: 34px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--sand);
      background: var(--surface);
      color: var(--text-light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px;
      transition: all 0.2s;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--warm-gray); }
    .btn-icon.danger:hover { color: var(--coral); border-color: var(--coral); }

    .link-btn {
      background: none; border: none;
      color: var(--teal);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Main */
    .admin-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--sand);
      border-radius: var(--radius-sm);
      padding: 20px 24px;
      box-shadow: var(--shadow-sm);
    }
    .stat-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .stat-val {
      font-family: 'Instrument Serif', serif;
      font-size: 30px;
      color: var(--teal);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .toolbar-search {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .toolbar-search input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1px solid var(--sand);
      border-radius: var(--radius-xs);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.2s;
    }
    .toolbar-search input:focus { border-color: var(--teal); }
    .toolbar-search .s-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--warm-gray); font-size: 14px;
    }

    .filter-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .pill {
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--warm-gray);
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }
    .pill:hover { border-color: var(--teal); color: var(--teal); }
    .pill.active { background: var(--teal); color: white; border-color: var(--teal); }

    /* Table */
    .kb-table {
      background: var(--surface);
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .kb-row {
      display: grid;
      grid-template-columns: 1fr 100px 100px 90px;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--sand);
      transition: background 0.15s;
    }
    .kb-row:last-child { border-bottom: none; }
    .kb-row:hover { background: var(--teal-pale); }

    .kb-row-head {
      background: var(--bg);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      padding: 12px 24px;
    }
    .kb-row-head:hover { background: var(--bg); }

    .kb-title {
      font-weight: 500;
      font-size: 14px;
      color: var(--deep);
    }
    .kb-title-sub {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }

    .kb-cat {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      display: inline-block;
      width: fit-content;
    }
    .c-product { background: var(--teal-pale); color: var(--teal); }
    .c-sales { background: rgba(184,146,46,0.1); color: var(--gold); }
    .c-support { background: var(--coral-bg); color: var(--coral); }
    .c-onboarding { background: rgba(107,143,111,0.1); color: var(--sage); }
    .c-general { background: rgba(122,122,114,0.08); color: var(--text-light); }

    .kb-date { font-size: 12px; color: var(--text-light); }

    .kb-actions { display: flex; gap: 6px; justify-content: flex-end; }

    .empty-row {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-light);
    }
    .empty-row h3 {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      margin: 8px 0 4px;
      color: var(--text);
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 32px;
      width: 92%; max-width: 540px;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      transform: scale(0.96);
      transition: transform 0.25s;
    }
    .modal-overlay.open .modal { transform: scale(1); }

    .modal h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 24px; font-weight: 400;
      margin-bottom: 2px;
    }
    .modal .msub { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--sand);
      border-radius: var(--radius-xs);
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); }
    .field textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
    .field select { cursor: pointer; }

    .modal-btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
    }

    /* ── DETAIL VIEW ── */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .detail-overlay.open { opacity: 1; pointer-events: all; }

    .detail-panel {
      background: var(--surface);
      border-radius: 18px;
      padding: 36px;
      width: 92%; max-width: 640px;
      max-height: 85vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    .detail-panel .dp-cat {
      display: inline-block;
      margin-bottom: 12px;
    }
    .detail-panel h2 {
      font-family: 'Instrument Serif', serif;
      font-size: 28px; font-weight: 400;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .detail-panel .dp-meta {
      font-size: 12px; color: var(--text-light);
      margin-bottom: 24px;
    }
    .detail-panel .dp-content {
      background: var(--bg);
      border: 1px solid var(--sand);
      border-radius: var(--radius-sm);
      padding: 28px;
      line-height: 1.8;
      font-size: 14.5px;
      white-space: pre-wrap;
    }
    .detail-panel .dp-close {
      margin-top: 20px;
      text-align: right;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--teal); color: white;
      padding: 12px 20px;
      border-radius: var(--radius-xs);
      font-weight: 500; font-size: 13px;
      z-index: 2000;
      transform: translateY(70px); opacity: 0;
      transition: all 0.3s;
      box-shadow: 0 4px 16px var(--teal-glow);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 768px) {
      .admin-header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .admin-main { padding: 20px 14px; }
      .kb-row { grid-template-columns: 1fr 80px 70px; }
      .kb-row .kb-date { display: none; }
      .toolbar { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ══════ LOGIN SCREEN ══════ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-icon"><img src="logo.png" alt="Classplus"></div>
      <h2>Admin Access</h2>
      <p class="login-sub">Enter your password to manage training content</p>
      <form onsubmit="doLogin(event)">
        <div class="login-field">
          <input type="password" id="loginPass" placeholder="Enter admin password" required>
        </div>
        <div class="login-error" id="loginError">Incorrect password. Try again.</div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
      <p class="login-hint">Default password: <strong>classplus2026</strong><br>Change it in the admin.html file</p>
    </div>
  </div>

  <!-- ══════ ADMIN DASHBOARD ══════ -->
  <div class="admin-app" id="adminApp">
    <header class="admin-header">
      <div class="admin-logo">
        <div class="admin-logo-mark"><img src="logo.png" alt="Classplus"></div>
        <h1>Training Manager <em>ADMIN</em></h1>
      </div>
      <div class="admin-actions">
        <button class="btn btn-outline btn-sm" onclick="exportKB()">⬇ Export</button>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">⬆ Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importKB(event)">
        <button class="btn btn-primary btn-sm" onclick="openModal()">＋ Add Learning</button>
        <a href="/" class="btn btn-outline btn-sm">🏠 View Site</a>
        <button class="btn-icon" onclick="logout()" title="Logout">🚪</button>
      </div>
    </header>

    <main class="admin-main">
      <!-- Stats -->
      <div class="stats-row" id="statsRow"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-search">
          <span class="s-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Search learnings..." oninput="renderTable()">
        </div>
        <div class="filter-pills" id="filterPills"></div>
      </div>

      <!-- Table -->
      <div class="kb-table" id="kbTable"></div>
    </main>
  </div>

  <!-- ── Add/Edit Modal ── -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modalTitle">Add New Learning</h2>
      <p class="msub">This content will be available to the AI and all users</p>
      <form onsubmit="saveLearning(event)">
        <input type="hidden" id="editId">
        <div class="field">
          <label>Title</label>
          <input type="text" id="fTitle" placeholder="e.g. How to process refunds" required>
        </div>
        <div class="field">
          <label>Category</label>
          <select id="fCat">
            <option value="Product">Product</option>
            <option value="Sales">Sales</option>
            <option value="Support">Support</option>
            <option value="Onboarding">Onboarding</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="field">
          <label>Short Description</label>
          <input type="text" id="fDesc" placeholder="A brief one-liner" required>
        </div>
        <div class="field">
          <label>Full Content</label>
          <textarea id="fContent" placeholder="Write the full training content here. Be detailed — the AI uses this to answer user questions." required></textarea>
        </div>
        <div class="modal-btns">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Learning</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Detail Viewer ── -->
  <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
    <div class="detail-panel" id="detailPanel"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ══════════════════════════
       CONFIG
       ══════════════════════════ */
    // ⚠️ CHANGE THIS PASSWORD before going live!
    const ADMIN_PASSWORD = 'classplus2026';
    const STORAGE_KEY = 'classplus_kb';
    const SESSION_KEY = 'classplus_admin_auth';
    const CATEGORIES = ['All', 'Product', 'Sales', 'Support', 'Onboarding', 'General'];
    const CAT_CLASS = { Product: 'c-product', Sales: 'c-sales', Support: 'c-support', Onboarding: 'c-onboarding', General: 'c-general' };
    let activeFilter = 'All';

    const DEFAULT_KB = [
      {
        id: '1', title: 'Getting Started with the Classplus Dashboard', category: 'Product',
        description: 'Navigate the main dashboard and understand key features.',
        content: 'The Classplus Dashboard is your command center.\n\nKey Sections:\n1. Home — Overview of recent activity, upcoming classes, quick stats\n2. Students — Manage enrollments, view progress, communicate\n3. Content — Upload videos, PDFs, create tests\n4. Payments — Track fee collection and pending dues\n5. Analytics — Engagement metrics and growth trends\n\nPro Tips:\n• Use the search bar to quickly find any student or class\n• Pin frequently accessed sections for faster navigation\n• Check the notification bell daily for important updates\n• Use keyboard shortcuts: Ctrl+K for quick search, Ctrl+N for new class',
        date: '2026-03-25'
      },
      {
        id: '2', title: 'Handling Payment Disputes', category: 'Support',
        description: 'Step-by-step guide for resolving payment-related issues.',
        content: 'When an educator reports a payment issue:\n\nStep 1 — Verify the Transaction\n• Ask for transaction ID or screenshot\n• Check the payment gateway dashboard\n• Note: Payments can take up to 48 hours to reflect\n\nStep 2 — Identify Issue Type\n• Failed transaction — Amount debited but not credited\n• Partial payment — Incorrect amount received\n• Refund request — Student wants money back\n\nStep 3 — Resolution\n• Failed transactions: Raise ticket with payment partner (TAT: 5-7 business days)\n• Partial payments: Verify fee structure, reconcile\n• Refunds: Follow refund policy, process within 7 working days\n\nAlways keep the educator informed about progress.',
        date: '2026-03-24'
      },
      {
        id: '3', title: 'Upselling Premium Features', category: 'Sales',
        description: 'Techniques to pitch premium plans to free-tier educators.',
        content: 'Free Plan educators already see value in Classplus. Our job is to multiply that value.\n\nKey Premium Benefits:\n• Branded app on Play Store / App Store\n• Advanced analytics for student engagement\n• Priority support with faster resolution\n• Built-in referral system and marketing tools\n\nConversation Framework:\n1. Ask about their goals — "Where do you see your coaching in 6 months?"\n2. Identify pain points — "What\'s the biggest challenge managing students online?"\n3. Connect features to goals — "With a branded app, students see you as a professional institution"\n4. Social proof — Share success stories of similar educators\n5. Offer a trial — Let them experience premium for 7 days\n\nNever hard-sell. Educate and let value speak.',
        date: '2026-03-23'
      },
      {
        id: '4', title: 'New Joiner Orientation Checklist', category: 'Onboarding',
        description: 'Everything a new team member needs in their first week.',
        content: 'Welcome to Classplus!\n\nDay 1:\n☐ Collect ID card and laptop from IT\n☐ Set up official email and Slack\n☐ Meet your buddy (assigned mentor)\n☐ Complete HR paperwork\n\nDay 2-3:\n☐ Product walkthrough session\n☐ Shadow 3 customer calls\n☐ Read the Brand Guidelines document\n☐ Join relevant Slack channels\n\nDay 4-5:\n☐ Take Product Knowledge Quiz (min 80% to pass)\n☐ Role-play session with manager\n☐ Set 30-60-90 day goals\n☐ First 1:1 with manager\n\nKey Resources:\n• Internal Wiki: wiki.classplus.co\n• Product Demo: demo.classplus.co\n• HR Policies: in your welcome email',
        date: '2026-03-22'
      }
    ];

    /* ══════════════════════════
       AUTH
       ══════════════════════════ */
    function doLogin(e) {
      e.preventDefault();
      const pass = document.getElementById('loginPass').value;
      if (pass === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, 'true');
        showAdmin();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function showAdmin() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      renderAll();
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    function checkAuth() {
      if (sessionStorage.getItem(SESSION_KEY) === 'true') showAdmin();
    }

    /* ══════════════════════════
       DATA
       ══════════════════════════ */
    function getKB() {
      const d = localStorage.getItem(STORAGE_KEY);
      if (!d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_KB)); return [...DEFAULT_KB]; }
      return JSON.parse(d);
    }
    function saveKB(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

    /* ══════════════════════════
       RENDER
       ══════════════════════════ */
    function renderAll() {
      renderStats();
      renderFilters();
      renderTable();
    }

    function renderStats() {
      const kb = getKB();
      const cats = new Set(kb.map(l => l.category));
      const words = kb.reduce((s, l) => s + l.content.split(/\s+/).length, 0);
      document.getElementById('statsRow').innerHTML = `
        <div class="stat-card"><div class="stat-label">Total Learnings</div><div class="stat-val">${kb.length}</div></div>
        <div class="stat-card"><div class="stat-label">Categories Used</div><div class="stat-val">${cats.size}</div></div>
        <div class="stat-card"><div class="stat-label">Total Words</div><div class="stat-val">${words.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-label">Last Updated</div><div class="stat-val" style="font-size:18px">${kb.length ? fmtDate(kb.sort((a,b) => new Date(b.date)-new Date(a.date))[0].date) : '—'}</div></div>
      `;
    }

    function renderFilters() {
      document.getElementById('filterPills').innerHTML = CATEGORIES.map(c =>
        `<button class="pill ${activeFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
      ).join('');
    }

    function renderTable() {
      const kb = getKB();
      const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
      const filtered = kb.filter(l => {
        const matchCat = activeFilter === 'All' || l.category === activeFilter;
        const matchQ = !q || l.title.toLowerCase().includes(q) || l.description.toLowerCase().includes(q) || l.content.toLowerCase().includes(q);
        return matchCat && matchQ;
      }).sort((a, b) => new Date(b.date) - new Date(a.date));

      const table = document.getElementById('kbTable');
      if (!filtered.length) {
        table.innerHTML = `<div class="empty-row"><div style="font-size:40px;opacity:0.4">📭</div><h3>No learnings found</h3><p>Add your first training content to get started</p></div>`;
        return;
      }

      table.innerHTML = `
        <div class="kb-row kb-row-head">
          <div>Title</div>
          <div>Category</div>
          <div>Date</div>
          <div style="text-align:right">Actions</div>
        </div>
        ${filtered.map(l => `
          <div class="kb-row">
            <div>
              <div class="kb-title">${esc(l.title)}</div>
              <div class="kb-title-sub">${esc(l.description)}</div>
            </div>
            <div><span class="kb-cat ${CAT_CLASS[l.category] || 'c-general'}">${l.category}</span></div>
            <div class="kb-date">${fmtDate(l.date)}</div>
            <div class="kb-actions">
              <button class="btn-icon" title="View" onclick="viewLearning('${l.id}')">👁</button>
              <button class="btn-icon" title="Edit" onclick="editLearning('${l.id}')">✏️</button>
              <button class="btn-icon danger" title="Delete" onclick="deleteLearning('${l.id}')">🗑</button>
            </div>
          </div>
        `).join('')}
      `;
    }

    function setFilter(c) { activeFilter = c; renderFilters(); renderTable(); }

    /* ══════════════════════════
       MODAL (Add/Edit)
       ══════════════════════════ */
    function openModal(data) {
      document.getElementById('modalOverlay').classList.add('open');
      if (data) {
        document.getElementById('modalTitle').textContent = 'Edit Learning';
        document.getElementById('editId').value = data.id;
        document.getElementById('fTitle').value = data.title;
        document.getElementById('fCat').value = data.category;
        document.getElementById('fDesc').value = data.description;
        document.getElementById('fContent').value = data.content;
      } else {
        document.getElementById('modalTitle').textContent = 'Add New Learning';
        document.getElementById('editId').value = '';
        document.getElementById('fTitle').value = '';
        document.getElementById('fCat').value = 'Product';
        document.getElementById('fDesc').value = '';
        document.getElementById('fContent').value = '';
      }
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function saveLearning(e) {
      e.preventDefault();
      const kb = getKB();
      const editId = document.getElementById('editId').value;
      const entry = {
        id: editId || Date.now().toString(),
        title: document.getElementById('fTitle').value.trim(),
        category: document.getElementById('fCat').value,
        description: document.getElementById('fDesc').value.trim(),
        content: document.getElementById('fContent').value.trim(),
        date: new Date().toISOString().slice(0, 10)
      };
      if (editId) {
        const i = kb.findIndex(l => l.id === editId);
        if (i > -1) kb[i] = entry;
      } else {
        kb.unshift(entry);
      }
      saveKB(kb);
      closeModal();
      renderAll();
      toast(editId ? 'Learning updated!' : 'Learning added — AI can now answer about this!');
    }

    function editLearning(id) { openModal(getKB().find(l => l.id === id)); }

    function deleteLearning(id) {
      if (!confirm('Delete this learning? The AI will no longer know about it.')) return;
      saveKB(getKB().filter(l => l.id !== id));
      renderAll();
      toast('Learning deleted');
    }

    /* ── Detail Viewer ── */
    function viewLearning(id) {
      const l = getKB().find(x => x.id === id);
      if (!l) return;
      document.getElementById('detailOverlay').classList.add('open');
      document.getElementById('detailPanel').innerHTML = `
        <span class="kb-cat ${CAT_CLASS[l.category] || 'c-general'} dp-cat">${l.category}</span>
        <h2>${esc(l.title)}</h2>
        <div class="dp-meta">${fmtDate(l.date)} · ${l.content.split(/\s+/).length} words</div>
        <div class="dp-content">${esc(l.content)}</div>
        <div class="dp-close"><button class="btn btn-outline" onclick="closeDetail()">Close</button></div>
      `;
    }
    function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

    /* ══════════════════════════
       IMPORT / EXPORT
       ══════════════════════════ */
    function exportKB() {
      const blob = new Blob([JSON.stringify(getKB(), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `classplus-kb-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      toast('Knowledge base exported!');
    }

    function importKB(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            const existing = getKB();
            const ids = new Set(existing.map(l => l.id));
            const newOnes = imported.filter(l => !ids.has(l.id));
            saveKB([...newOnes, ...existing]);
            renderAll();
            toast(`Imported ${newOnes.length} new learnings!`);
          }
        } catch { toast('Invalid file format'); }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    /* ══════════════════════════
       UTILS
       ══════════════════════════ */
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtDate(d) { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }); }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // Init
    checkAuth();
  </script>
</body>
</html>
